services:
  # --- MEDIA CENTER (Restoring this!) ---
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - /mnt/cloud_storage/jellyfin_config:/config
      - /mnt/cloud_storage/media:/data/ssd_media
      - /mnt/data_1:/data/hdd_1
      - /mnt/data_2:/data/hdd_2
      - /mnt/data_3:/data/hdd_3
      - /mnt/data_4:/data/hdd_4
      - /mnt/data_5:/data/hdd_5
    ports:
      - "8096:8096"
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "44"
      - "110"
    networks:
      - cloud-net
    restart: unless-stopped

  # --- MISSION CONTROL ---
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    command: -H unix:///var/run/docker.sock
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /mnt/cloud_storage/portainer_data:/data
    ports:
      - "9443:9443"
      - "9002:9000"
    networks:
      - cloud-net

  # --- INFRASTRUCTURE ---
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    networks:
      - cloud-net
    restart: unless-stopped

  # --- STORAGE ---
  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    volumes:
      - /mnt/cloud_storage/minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - cloud-net
    restart: unless-stopped

  # --- COMPUTE ---
  jupyter:
    image: rocm/pytorch:latest
    container_name: jupyter-lab
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
    ipc: host
    security_opt:
      - seccomp:unconfined
    volumes:
      - /mnt/cloud_storage/jupyter_workspace:/workspace
    working_dir: /workspace
    command: bash -c "pip install jupyterlab && jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token='${JUPYTER_TOKEN}'"
    ports:
      - "8888:8888" 
    networks:
      - cloud-net
    restart: unless-stopped

  # --- AI STACK ---
  ollama:
    image: ollama/ollama:rocm
    container_name: ollama
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
    ipc: host
    security_opt:
      - seccomp:unconfined
    environment:
      - HSA_OVERRIDE_GFX_VERSION=10.3.0
    volumes:
      - /mnt/cloud_storage/ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - cloud-net
    restart: unless-stopped

  pipelines:
    image: ghcr.io/open-webui/pipelines:main
    container_name: pipelines
    environment:
      - PIPELINES_API_KEY=${PIPELINES_API_KEY}
    volumes:
      - /mnt/cloud_storage/pipelines_data:/app/pipelines
    ports:
      - "9099:9099"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - cloud-net
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: redis
    networks:
      - cloud-net
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "8080:8080"
    volumes:
      - /mnt/cloud_storage/searxng:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
    networks:
      - cloud-net
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - ENABLE_RAG_WEB_SEARCH=True
      - RAG_WEB_SEARCH_ENGINE=searxng
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>
      - RAG_WEB_SEARCH_RESULT_COUNT=10
      - RAG_WEB_SEARCH_CONCURRENT_REQUESTS=20
      - PIPELINES_URL=http://pipelines:9099
      - PIPELINES_API_KEY=${PIPELINES_API_KEY}
      - OPENAI_API_BASE_URL=http://pipelines:9099
      - OPENAI_API_KEY=${PIPELINES_API_KEY}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - /mnt/cloud_storage/webui_data:/app/backend/data
    ports:
      - "3000:8080"
    depends_on:
      - ollama
      - searxng
      - pipelines
    networks:
      - cloud-net
    restart: unless-stopped

  # --- DEVOPS ---
  gitea:
    image: gitea/gitea:latest
    container_name: gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
    volumes:
      - /mnt/cloud_storage/gitea_data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3001:3000"
      - "2222:22"
    networks:
      - cloud-net
    restart: unless-stopped

  gitea-runner:
    image: gitea/act_runner:latest
    container_name: gitea-runner
    environment:
      - CONFIG_FILE=/config.yaml
      - GITEA_INSTANCE_URL=http://gitea:3000
      - GITEA_RUNNER_REGISTRATION_TOKEN=${GITEA_RUNNER_REGISTRATION_TOKEN}
      - GITEA_RUNNER_NAME=god-mode-worker
    volumes:
      - /mnt/cloud_storage/gitea_runner:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - cloud-net
    depends_on:
      - gitea
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - /mnt/cloud_storage/postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - cloud-net
    restart: unless-stopped

networks:
  cloud-net:
    driver: bridge
